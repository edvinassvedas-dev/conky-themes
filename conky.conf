-- ─────────────────────────────────────────────
--  conky.conf · themed
-- ─────────────────────────────────────────────

dofile(os.getenv('HOME') .. '/.config/conky/themes/themes.lua')
local vpn_content = dofile(os.getenv('HOME') .. '/.config/conky/modules/vpn.lua')
local storage_content = dofile(os.getenv('HOME') .. '/.config/conky/modules/storage.lua')
local market_content = dofile(os.getenv('HOME') .. '/.config/conky/modules/finance.lua')

local t = themes.moss   -- ← theme-switch.sh rewrites this line

conky.config = {

  background             = false,
  own_window             = true,
  own_window_type        = 'desktop',
  own_window_argb_visual = true,
  own_window_argb_value  = 80,
  own_window_transparent = true,
  own_window_hints       = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  double_buffer          = true,

  alignment              = 'top_right',
  gap_x                  = 16,
  gap_y                  = 30,
  minimum_width          = 300,
  maximum_width          = 300,
  minimum_height         = 5,

  use_xft                = true,
  font                   = 'JetBrains Mono:size=8.9',
  xftalpha               = 1.0,
  uppercase              = false,
  override_utf8_locale   = true,
  short_units            = true,
  pad_percents           = 2,
  top_name_width         = 18,

  default_color          = t.default_color,
  default_shade_color    = t.default_shade_color,
  draw_shades            = t.draw_shades,
  shade_depth            = t.shade_depth,
  default_outline_color  = t.default_outline_color,
  draw_outline           = t.draw_outline,
  outline_depth          = t.outline_depth,
  draw_borders           = false,
  draw_graph_borders     = false,

  color1 = t.color1,  -- bright  · values
  color2 = t.color2,  -- mid     · labels
  color3 = t.color3,  -- dim     · dividers / bars
  color4 = t.color4,  -- accent  · section headers  ★
  color5 = t.color5,  -- amber   · temp / heat
  color6 = t.color6,  -- green   · ok / connected

  update_interval        = 2.0,
  total_run_times        = 0,
  cpu_avg_samples        = 3,
  net_avg_samples        = 3,
  no_buffers             = true,
};

conky.text = string.format([[
${voffset 8}
${color4}${font JetBrains Mono:bold:size=22}${alignc}${time %%H:%%M:%%S}${font}
${color2}${alignc}${time %%A  %%d %%B %%Y}
${voffset 2}
${color3}${hr 1}
${voffset 2}
${goto 20}${color4}◈ CPU  ${color5}${acpitemp}°C${alignr 20}${color1}${cpu cpu0}%%
${goto 20}${cpugraph 20,260 %s %s -l}
${voffset 2}
${goto 20}${color4}◈ RAM${alignr 20}${color1}${mem}${color2} / $memmax  ${color2}(${memperc}%%)
${goto 20}${color4}${membar 3,260}
${voffset 2}
${goto 20}${color2}Swap${alignr 20}${color1}${swap}${color2} / $swapmax  ${color2}(${swapperc}%%)
${goto 20}${color3}${swapbar 3,260}
${voffset 2}
${color3}${hr 1}
${voffset 2}
${goto 20}${color4}◈ TOP${goto 192}${color2}cpu%%${alignr 24}${color2}mem
${goto 20}${color2}${top name 1}${goto 185}${color1}${top cpu 1}%%${alignr 20}${top mem_res 1}
${goto 20}${color2}${top name 2}${goto 185}${color1}${top cpu 2}%%${alignr 20}${top mem_res 2}
${goto 20}${color2}${top name 3}${goto 185}${color1}${top cpu 3}%%${alignr 20}${top mem_res 3}
${goto 20}${color2}${top name 4}${goto 185}${color1}${top cpu 4}%%${alignr 20}${top mem_res 4}
${goto 20}${color2}${top name 5}${goto 185}${color1}${top cpu 5}%%${alignr 20}${top mem_res 5}
${voffset 2}
${color3}${hr 1}
${voffset 2}
%s
${color3}${hr 1}
${voffset 2}
%s
${color3}${hr 1}
${voffset 2}
%s
${voffset 5}
${color2}${alignr 20}$sysname $kernel
]], t.graph_lo, t.graph_hi, storage_content, vpn_content, market_content)
